<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - WolfClub</title>
    <link rel="stylesheet" href="css/menu.css">
</head>
<body class="login-page-bg">

    <div class="simple-login-container">
        <div class="simple-login-box">
            
            <h1>WolfClub</h1>

            <button class="social-btn google-btn">
                <img src="img/google.jpg" alt="Google"> Tiếp tục với Google
            </button>
            <button class="social-btn apple-btn">
                <img src="img/apple.jpg" alt="Apple"> Tiếp tục với Apple
            </button>

            <div class="divider">
                <span>Hoặc</span>
            </div>

            <form id="step-login-form">
                
                <div class="input-group">
                    <input type="email" id="user-email" placeholder="Nhập địa chỉ email" required>
                </div>
                
                <div class="input-group" id="password-group" style="display: none;">
                    <input type="password" id="user-password" placeholder="Nhập mật khẩu" >
                </div>

                <button type="submit" class="btn-continue" id="btn-submit">Tiếp tục</button>
            </form>

            <div class="back-link">
                <a href="index.html">Quay lại và tiếp tục mua hàng</a>
            </div>

        </div>
    </div>

    <script>
        const form = document.getElementById('step-login-form');
        const emailInput = document.getElementById('user-email');
        const passwordGroup = document.getElementById('password-group');
        const passwordInput = document.getElementById('user-password');
        const btnSubmit = document.getElementById('btn-submit');

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            // Nếu ô mật khẩu đang bị ẩn -> Nghĩa là khách đang ở Bước 1 (Nhập Email)
            if (passwordGroup.style.display === 'none') {
                
                // Thuật toán kiểm tra cấu trúc email (phải có @ và dấu .)
                const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                
                if (emailPattern.test(emailInput.value)) {
                    // Cú pháp đúng -> Mở khóa ô mật khẩu, đổi tên nút
                    passwordGroup.style.display = 'block';
                    btnSubmit.innerText = 'Đăng nhập';
                    passwordInput.focus(); // Tự động trỏ chuột vào ô mật khẩu
                } else {
                    alert('Vui lòng nhập đúng định dạng email (VD: vd@gmail.com)');
                }
                
            } else {
                // Nếu ô mật khẩu đang hiện -> Nghĩa là khách đang ở Bước 2 (Gửi đăng nhập)
                if (passwordInput.value.trim() !== '') {
                    // Lưu email vào bộ nhớ rồi ném sang trang Account
                    localStorage.setItem('logged_in_email', emailInput.value);
                    window.location.href = 'account.html';
                } else {
                    alert('Vui lòng nhập mật khẩu!');
                }
            }
        });
    </script>
</body>
</html>
